name: Publish to GitHub Packages

# Publish a 0.0.0-based build on every push, so any commit is installable. There
# is no semver here: the version string only records where a build came from, and
# consumers pin the exact string (immutable per commit).
#
#   main:   @interline-io/tlv2-auth@0.0.0-main.<sha>             (dist-tag: latest)
#   branch: @interline-io/tlv2-auth@0.0.0-branch.<branch>.<sha>  (dist-tag: <branch>)
#
# The 0.0.0 base keeps every build sorting below any older real release, and the
# main/branch prefix makes "is this a main build or a branch preview?" obvious.
on:
  push:
    branches:
      - '**'

# Default to no permissions; each job grants only what it needs.
permissions: {}

# Cancel superseded branch-preview publishes (only the latest commit's preview
# matters), but never cancel on main: every main commit is a distinct
# 0.0.0-main.<sha> a consumer may pin, so let them run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pinned to v5: v6 bootstraps pnpm v11 and doesn't honor the
      # `packageManager` field, breaking v10-format lockfiles. See:
      #   https://github.com/pnpm/action-setup/issues/227
      #   https://github.com/pnpm/action-setup/issues/225
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@interline-io'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version and tag
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "$REF_NAME" = "main" ]; then
            echo "version=0.0.0-main.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            BRANCH=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//')
            echo "version=0.0.0-branch.${BRANCH}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        run: pnpm version ${{ steps.meta.outputs.version }} --no-git-tag-version

      - name: Build
        run: pnpm prepack

      - name: Publish
        run: pnpm publish --no-git-checks --tag ${{ steps.meta.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
