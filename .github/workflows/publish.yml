name: Publish to GitHub Packages

on:
  push:
    branches:
      - '**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Default to no permissions; each job grants only what it needs.
permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pinned to v5: see note in ci.yml.
      # https://github.com/pnpm/action-setup/issues/227
      # https://github.com/pnpm/action-setup/issues/225
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@interline-io'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version and tags
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "$REF_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/^-//')
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [ "$REF_NAME" = "main" ]; then
            echo "version=${BASE_VERSION}-sha.${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "version=${BASE_VERSION}-branch.${BRANCH}.${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "tag=${BRANCH}" >> $GITHUB_OUTPUT
          fi

      - name: Set version
        run: pnpm version ${{ steps.meta.outputs.version }} --no-git-tag-version

      - name: Build
        run: pnpm prepack

      - name: Publish
        run: pnpm publish --no-git-checks --tag ${{ steps.meta.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Open a "Version Packages" PR when changesets are present,
  # or publish on merge of that PR.
  release:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@interline-io'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
