name: CI

on:
  pull_request:
    branches: [main]

# Default to no permissions; each job grants only what it needs.
permissions: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Pinned to v5: v6 bootstraps pnpm v11 and doesn't honor the
      # `packageManager` field, breaking v10-format lockfiles. See:
      #   https://github.com/pnpm/action-setup/issues/227
      #   https://github.com/pnpm/action-setup/issues/225
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@interline-io'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare (stub build)
        run: pnpm dev:prepare
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm nuxt typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
