name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      # Pinned to v5: v6 bootstraps pnpm v11 and doesn't honor the
      # `packageManager` field, breaking v10-format lockfiles. See:
      #   https://github.com/pnpm/action-setup/issues/227
      #   https://github.com/pnpm/action-setup/issues/225
      - uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@interline-io'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare (stub build)
        run: pnpm dev:prepare
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm nuxt typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
